<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Get Fit. Live Longer.</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Get Fit" />
  <meta name="theme-color" content="#0A0A0A" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%230A0A0A'/%3E%3Crect x='30' y='30' width='452' height='452' rx='90' fill='%23141414'/%3E%3Ctext x='256' y='280' font-family='Arial Black' font-size='180' font-weight='900' fill='%2300E87A' text-anchor='middle'%3EGF%3C/text%3E%3Ctext x='256' y='400' font-family='Arial' font-size='58' fill='%23888' text-anchor='middle'%3ELIVE LONGER%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0A0A0A; overscroll-behavior: none; }
    body { font-family: 'DM Sans', sans-serif; color: #fff; }
    #root { height: 100%; }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #2A2A2A; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #00E87A; cursor: pointer; border: 3px solid #0A0A0A; box-shadow: 0 0 0 2px #00E87A; }
    input[type=number], input[type=text] { background: #1C1C1C; border: 1px solid #2A2A2A; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; width: 100%; outline: none; -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number]:focus, input[type=text]:focus { border-color: #00E87A; }
    textarea { background: #1C1C1C; border: 1px solid #2A2A2A; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 12px 14px; width: 100%; outline: none; resize: none; }
    textarea:focus { border-color: #00E87A; }
    ::-webkit-scrollbar { width: 0; }
    .err { padding: 40px 20px; color: #fff; font-family: sans-serif; }
    .err h2 { color: #FF5555; margin-bottom: 12px; }
    .err pre { background: #1C1C1C; padding: 14px; border-radius: 8px; font-size: 11px; overflow: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#666;font-family:sans-serif;font-size:14px">Loading...</div></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const A = "#00E87A", BG = "#0A0A0A", CARD = "#141414", C2 = "#1C1C1C";
    const BDR = "#2A2A2A", MUT = "#666", SOFT = "#AAA", RED = "#FF5555";
    const energyLabels = ["","Wiped","Tired","OK","Good","Great"];
    const moodLabels   = ["","Rough","Meh","OK","Good","Great"];

    const db = {
      get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
    };

    const localToday = () => {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    };
    const bmi = (w, ft, ins) => {
      const h = (parseInt(ft)||0)*12 + (parseInt(ins)||0);
      if (!h || !w) return null;
      return +((w/(h*h))*703).toFixed(1);
    };
    const bmiLabel = (b) => {
      if (!b) return "";
      if (b < 18.5) return "Underweight";
      if (b < 25) return "Normal";
      if (b < 30) return "Overweight";
      if (b < 35) return "Obese I";
      if (b < 40) return "Obese II";
      return "Obese III";
    };
    const bmiColor = (b) => { if (!b) return SOFT; if (b < 25) return A; if (b < 30) return "#FFD700"; return RED; };
    const fmtDate = (s) => { try { return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); } catch(e) { return s; } };
    const greet = () => { const h = new Date().getHours(); return h<12?"Good Morning":h<17?"Good Afternoon":"Good Evening"; };

    const calcStreak = (checkins) => {
      let streak = 0;
      const d = new Date();
      for (let i = 0; i < 365; i++) {
        const s = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
        const c = checkins[s] || {};
        if (i===0) { if (c.morning||c.evening) { streak++; d.setDate(d.getDate()-1); continue; } else break; }
        if (c.morning && c.evening) { streak++; d.setDate(d.getDate()-1); } else break;
      }
      return streak;
    };

    const get7DayTrends = (checkins) => {
      const days = [];
      const now = new Date();
      for (let i = 6; i >= 0; i--) {
        const dd = new Date(now); dd.setDate(now.getDate()-i);
        const s = dd.getFullYear() + "-" + String(dd.getMonth()+1).padStart(2,"0") + "-" + String(dd.getDate()).padStart(2,"0");
        days.push(Object.assign({ date: s }, checkins[s] || {}));
      }
      const avg = (key, sub) => {
        const vals = days.map((d) => sub ? (d[sub] && d[sub][key]) : d[key]).filter((v) => v != null);
        return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : "--";
      };
      return {
        sleepAvg: avg("sleepScore","morning"),
        stressAvg: avg("stressLevel","evening"),
        tirednessAvg: avg("tiredness","evening"),
        activeDays: days.filter((d) => d.evening && d.evening.activityLevel && d.evening.activityLevel !== "Sedentary").length
      };
    };

    const buildInsights = (checkins) => {
      const insights = [];
      const allDates = Object.keys(checkins).sort();
      if (allDates.length < 3) return insights;
      const exD  = allDates.filter((d) => checkins[d] && checkins[d].evening && checkins[d].evening.exerciseDone && checkins[d].evening.exerciseDone.length > 0);
      const noEx = allDates.filter((d) => checkins[d] && checkins[d].evening && (!checkins[d].evening.exerciseDone || checkins[d].evening.exerciseDone.length === 0));
      if (exD.length >= 2 && noEx.length >= 2) {
        const avgS = (arr) => {
          const vals = arr.map((d) => checkins[d] && checkins[d].evening && checkins[d].evening.stressLevel).filter(Boolean);
          return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : null;
        };
        const es = avgS(exD), ns = avgS(noEx);
        if (es && ns) insights.push({ icon:"🏃", text: "Your avg stress on exercise days was " + es + "/10, vs " + ns + "/10 on rest days. Movement is your stress medicine." });
      }
      return insights;
    };

    // ═════════════════════════════════════════════════════════
    // EXERCISE PLAN ENGINE
    // Research-based: Couch-to-5K + NHS + Gymshark + Franciscan Health
    // Progression: walk base → intervals → running → 5K capable
    // ═════════════════════════════════════════════════════════
    const getWorkoutForDay = (dayNumber) => {
      // dayNumber = days since start (0 = day 1)
      const week = Math.floor(dayNumber / 7) + 1;
      const dayOfWeek = new Date().getDay(); // 0=Sun, 3=Wed (office day)

      // PHASE 1: Weeks 1-3 — Build the walking habit
      if (week <= 3) {
        const schedule = {
          0: { type: "active_recovery", title: "Active Recovery Walk", icon: "🚶", duration: 20, details: "Easy 20-min walk. Flat route. Conversation pace — you should be able to talk easily.", intensity: "Low" },
          1: { type: "walk", title: "Daily Walk", icon: "🚶", duration: 30, details: "30-min brisk walk. Aim to break a light sweat. Track with your phone or watch.", intensity: "Moderate" },
          2: { type: "peloton", title: "Peloton Beginner Ride", icon: "🚴", duration: 20, details: "20-min beginner ride, low resistance (30-40%). Focus on cadence (80-90 rpm), not output. Search 'Low Impact' rides.", intensity: "Low-Moderate" },
          3: { type: "walk_office", title: "Lunch Break Walk", icon: "🚶", duration: 20, details: "Office day — take a 20-min walk at lunch. Walking is protecting your progress.", intensity: "Low" },
          4: { type: "bodyweight", title: "Bodyweight Foundation", icon: "💪", duration: 25, details: "Wall push-ups 2x10 · Chair-assisted squats 2x12 · Standing hip hinges 2x10 · Plank hold 2x15sec · Dead bug 2x8/side. Rest 60s between sets.", intensity: "Moderate" },
          5: { type: "walk", title: "Brisk Walk", icon: "🚶", duration: 30, details: "30-min walk. Pick up the pace slightly. Focus on good posture — head up, shoulders back.", intensity: "Moderate" },
          6: { type: "peloton", title: "Peloton Endurance", icon: "🚴", duration: 30, details: "30-min endurance ride. Keep resistance steady. Build your cycling base.", intensity: "Moderate" }
        };
        return schedule[dayOfWeek];
      }

      // PHASE 2: Weeks 4-6 — Walk-to-Run intervals begin (C25K Weeks 1-3)
      if (week <= 6) {
        const schedule = {
          0: { type: "active_recovery", title: "Recovery Walk", icon: "🚶", duration: 25, details: "25-min easy walk. Let your body absorb the new training load.", intensity: "Low" },
          1: { type: "intervals", title: "Walk-Run Intervals", icon: "🏃", duration: 25, details: "5-min warm-up walk. Then: 60-sec slow jog / 90-sec walk × 8 rounds. 5-min cool-down walk. If jogging is too much, power-walk fast.", intensity: "Moderate-High" },
          2: { type: "peloton", title: "Peloton Climb Ride", icon: "🚴", duration: 30, details: "30-min ride with a mix of climbs. Higher resistance builds leg strength that protects knees when running.", intensity: "Moderate" },
          3: { type: "walk_office", title: "Lunch Break Walk", icon: "🚶", duration: 25, details: "Office day — 25-min lunch walk. Take the long route back. Protect the habit.", intensity: "Low" },
          4: { type: "bodyweight", title: "Bodyweight Progression", icon: "💪", duration: 25, details: "Incline push-ups 3x8 · Bodyweight squats 3x12 · Glute bridges 3x10 · Plank hold 3x20sec · Bird dog 3x8/side.", intensity: "Moderate" },
          5: { type: "intervals", title: "Walk-Run Intervals", icon: "🏃", duration: 28, details: "5-min warm-up. Then: 90-sec jog / 2-min walk × 6 rounds. 5-min cool-down. Slow the jog if needed — you should still be able to talk.", intensity: "Moderate-High" },
          6: { type: "peloton", title: "Long Peloton Ride", icon: "🚴", duration: 40, details: "40-min ride of your choice. Scenic ride or music ride — enjoy it. Build aerobic base.", intensity: "Moderate" }
        };
        return schedule[dayOfWeek];
      }

      // PHASE 3: Weeks 7-9 — Longer run intervals (C25K Weeks 4-6)
      if (week <= 9) {
        const schedule = {
          0: { type: "active_recovery", title: "Recovery Walk", icon: "🚶", duration: 30, details: "30-min easy walk. Enjoy being outside. Your body is transforming — let it recover.", intensity: "Low" },
          1: { type: "intervals", title: "Run Intervals", icon: "🏃", duration: 30, details: "5-min warm-up. Then: 3-min jog / 90-sec walk × 5 rounds. 5-min cool-down. You're becoming a runner.", intensity: "High" },
          2: { type: "peloton", title: "Peloton HIIT Ride", icon: "🚴", duration: 30, details: "30-min HIIT ride. Intervals of high-intensity effort with recovery. Search 'Beginner HIIT'.", intensity: "High" },
          3: { type: "walk_office", title: "Lunch Break Walk", icon: "🚶", duration: 25, details: "Office day — 25-min walk. Consistency over perfection.", intensity: "Low" },
          4: { type: "bodyweight", title: "Strength Circuit", icon: "💪", duration: 30, details: "Push-ups 3x10 · Walking lunges 3x10/leg · Glute bridges 3x12 · Plank hold 3x30sec · Mountain climbers 3x20.", intensity: "Moderate-High" },
          5: { type: "intervals", title: "Run Intervals", icon: "🏃", duration: 32, details: "5-min warm-up. Then: 5-min jog / 2-min walk × 4 rounds. 5-min cool-down. Pace is conversational jog.", intensity: "High" },
          6: { type: "peloton", title: "Long Endurance Ride", icon: "🚴", duration: 45, details: "45-min endurance ride. Steady pace. This builds your metabolic engine.", intensity: "Moderate" }
        };
        return schedule[dayOfWeek];
      }

      // PHASE 4: Weeks 10-12 — Continuous running (C25K Weeks 7-9)
      if (week <= 12) {
        const schedule = {
          0: { type: "active_recovery", title: "Recovery Walk", icon: "🚶", duration: 35, details: "35-min walk. Enjoy the movement. You've come a long way.", intensity: "Low" },
          1: { type: "run", title: "Continuous Run", icon: "🏃", duration: 30, details: "5-min warm-up walk. Then run continuously for 20 min at a conversational pace. 5-min cool-down. No shame in slowing down.", intensity: "High" },
          2: { type: "peloton", title: "Peloton Power Ride", icon: "🚴", duration: 30, details: "30-min power zone or interval ride. You have the cardio base now to push harder.", intensity: "High" },
          3: { type: "walk_office", title: "Lunch Break Walk", icon: "🚶", duration: 25, details: "Office day — active recovery walk. Stay consistent.", intensity: "Low" },
          4: { type: "bodyweight", title: "Full-Body Strength", icon: "💪", duration: 30, details: "Push-ups 3x12 · Reverse lunges 3x10/leg · Single-leg glute bridges 3x8 · Side plank 3x20sec/side · Burpees 3x8.", intensity: "High" },
          5: { type: "run", title: "Continuous Run", icon: "🏃", duration: 32, details: "5-min warm-up. 25-min continuous run. 5-min cool-down. By end of week 12, this should feel comfortable.", intensity: "High" },
          6: { type: "peloton", title: "Long Ride", icon: "🚴", duration: 45, details: "45-min ride. Challenge yourself with a themed or scenic ride.", intensity: "Moderate-High" }
        };
        return schedule[dayOfWeek];
      }

      // PHASE 5: Weeks 13+ — Maintenance / 5K+ / Ongoing
      const schedule = {
        0: { type: "active_recovery", title: "Recovery Walk", icon: "🚶", duration: 40, details: "40-min walk. Active recovery. Listen to your body.", intensity: "Low" },
        1: { type: "run", title: "5K Run", icon: "🏃", duration: 35, details: "5-min warm-up. 30-min continuous run (≈3 miles / 5K). Track your time, see improvement over weeks.", intensity: "High" },
        2: { type: "peloton", title: "Peloton Power Zone", icon: "🚴", duration: 45, details: "45-min power zone ride. Build sustained cycling fitness.", intensity: "High" },
        3: { type: "walk_office", title: "Lunch Break Walk", icon: "🚶", duration: 30, details: "Office day — 30-min walk. The habit is who you are now.", intensity: "Low" },
        4: { type: "bodyweight", title: "Advanced Circuit", icon: "💪", duration: 35, details: "Decline push-ups 3x10 · Jump squats 3x10 · Split squats 3x10/leg · Plank variations 3x45sec · Burpees 3x10.", intensity: "High" },
        5: { type: "run", title: "Long Run", icon: "🏃", duration: 45, details: "5-min warm-up. 35-40-min continuous run. Slowly extend the distance. 10K is your next goal.", intensity: "High" },
        6: { type: "peloton", title: "Long Endurance Ride", icon: "🚴", duration: 60, details: "60-min endurance ride. Deep base-building. Treat it like a meditation on wheels.", intensity: "Moderate" }
      };
      return schedule[dayOfWeek];
    };

    // ═════════════════════════════════════════════════════════
    // FASTING PLAN ENGINE
    // Research-based: 16:8 TRE + Gary Brecka 72-hour water fast
    // Ramp: 12:12 → 14:10 → 16:8, with periodic extended fasts
    // ═════════════════════════════════════════════════════════
    const getFastingPlanForDay = (dayNumber) => {
      const week = Math.floor(dayNumber / 7) + 1;
      const dayOfWeek = new Date().getDay();

      // Extended fast schedule:
      // Week 4: first 48-hour fast (end of phase 1)
      // Then every 4 weeks: alternate 48h / 72h
      // Fast starts Friday evening, ends Sunday or Monday morning
      const isExtendedFastWeek = week >= 4 && (week - 4) % 4 === 0;
      const is72Hour = week >= 8 && (week - 8) % 8 === 0; // 72h every 8 weeks after week 8

      // Friday = start extended fast evening
      if (isExtendedFastWeek && dayOfWeek === 5) {
        return {
          type: "extended_start",
          title: is72Hour ? "72-Hour Fast Begins Tonight" : "48-Hour Fast Begins Tonight",
          icon: "🔋",
          eatWindow: "11:00 AM – 6:00 PM",
          fastDuration: is72Hour ? "72 hours" : "48 hours",
          tips: "Last meal by 6 PM. Eat protein-rich + some healthy fats for satiety. Stock up on sea salt, magnesium, and sparkling water. Black coffee is allowed during the fast. You've got this.",
          phase: is72Hour ? "Extended 72-Hour" : "Extended 48-Hour"
        };
      }
      if (isExtendedFastWeek && dayOfWeek === 6) {
        return {
          type: "extended_mid",
          title: is72Hour ? "Day 1 of 72-Hour Fast" : "Day 1 of 48-Hour Fast",
          icon: "💧",
          eatWindow: "WATER ONLY",
          fastDuration: "Continue",
          tips: "Hours 12-24: Hunger waves come and go. Drink water with a pinch of sea salt. Walk lightly. Hours 24-48: Autophagy kicks in. Expect mental clarity. Stay busy — out of the kitchen.",
          phase: is72Hour ? "Extended 72-Hour" : "Extended 48-Hour"
        };
      }
      if (isExtendedFastWeek && dayOfWeek === 0) {
        return {
          type: is72Hour ? "extended_mid" : "extended_end",
          title: is72Hour ? "Day 2 of 72-Hour Fast" : "Break Your 48-Hour Fast",
          icon: is72Hour ? "💧" : "🥣",
          eatWindow: is72Hour ? "WATER ONLY" : "Break fast at 6 PM with bone broth, then small meal",
          fastDuration: is72Hour ? "Continue" : "Complete!",
          tips: is72Hour ? "Hours 48-72: Stem cell activity increases, per Brecka's protocol. Deep autophagy. Keep electrolytes up. Tomorrow you break the fast." : "BREAK FAST GENTLY: Start with bone broth or warm vegetable broth. Wait 1 hour. Then a small protein + vegetable meal. Do NOT feast — it will make you sick.",
          phase: is72Hour ? "Extended 72-Hour" : "Extended 48-Hour"
        };
      }
      if (is72Hour && dayOfWeek === 1) {
        return {
          type: "extended_end",
          title: "Break Your 72-Hour Fast",
          icon: "🥣",
          eatWindow: "Break fast at noon with bone broth, then small meal",
          fastDuration: "Complete!",
          tips: "BREAK THE FAST SLOWLY: Bone broth first, wait 1-2 hours. Then small meal of protein + cooked vegetables. Skip raw vegetables and fatty foods today. Your hunger hormones will be recalibrated for 1-2 weeks.",
          phase: "Extended 72-Hour"
        };
      }

      // PHASE 1: Week 1 — Gentle 12:12
      if (week === 1) {
        return {
          type: "12_12",
          title: "12:12 Fasting (Gentle Start)",
          icon: "🌱",
          eatWindow: "8:00 AM – 8:00 PM",
          fastDuration: "12 hours",
          tips: "Just stop eating at 8 PM. Resume at 8 AM. Most of the fast is while you sleep. This is your gentle on-ramp.",
          phase: "Ramp-Up Week 1"
        };
      }

      // PHASE 2: Week 2 — 14:10
      if (week === 2) {
        return {
          type: "14_10",
          title: "14:10 Fasting",
          icon: "⚡",
          eatWindow: "10:00 AM – 8:00 PM",
          fastDuration: "14 hours",
          tips: "Push breakfast back to 10 AM. The fat-burning 'metabolic switch' activates around hour 12-14. Black coffee is allowed and helps suppress appetite.",
          phase: "Ramp-Up Week 2"
        };
      }

      // PHASE 3: Week 3+ — 16:8 (the main protocol)
      // Optimal window based on research: 11 AM - 7 PM (highest 30-day adherence rate)
      return {
        type: "16_8",
        title: "16:8 Intermittent Fasting",
        icon: "🎯",
        eatWindow: "11:00 AM – 7:00 PM",
        fastDuration: "16 hours",
        tips: "Break fast with 30-40g protein (eggs, Greek yogurt, meat). Stop eating by 7 PM. Sparkling water, black coffee, plain tea during fast window — these do NOT break the fast.",
        phase: "Default Protocol"
      };
    };

    const daysSinceStart = (startDate) => {
      if (!startDate) return 0;
      const start = new Date(startDate + "T12:00:00");
      const now = new Date();
      return Math.floor((now - start) / (1000 * 60 * 60 * 24));
    };

    const WeightChart = ({ data }) => {
      if (!data || data.length < 2) return null;
      const W = 340, HT = 170, PX = 34, PY = 20;
      const weights = data.map((d) => d.weight);
      const minW = Math.min.apply(null, weights) - 3;
      const maxW = Math.max.apply(null, weights) + 3;
      const range = maxW - minW || 1;
      const xStep = (W - PX*2) / Math.max(1, data.length - 1);
      const pts = data.map((d, i) => ({
        x: PX + i * xStep,
        y: HT - PY - ((d.weight - minW) / range) * (HT - PY*2),
        weight: d.weight, date: d.date
      }));
      const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + " " + p.y.toFixed(1)).join(" ");
      const gridRatios = [0, 0.25, 0.5, 0.75, 1];
      return (
        <svg viewBox={"0 0 " + W + " " + HT} style={{ width: "100%", height: HT }}>
          {gridRatios.map((r, i) => { const y = PY + r * (HT - PY*2); return <line key={i} x1={PX} y1={y} x2={W - PX} y2={y} stroke={BDR} strokeDasharray="3 3" strokeWidth="1" />; })}
          {gridRatios.map((r, i) => { const val = (maxW - r * range).toFixed(0); const y = PY + r * (HT - PY*2); return <text key={"t"+i} x={PX - 6} y={y + 3} fill={MUT} fontSize="9" textAnchor="end">{val}</text>; })}
          <path d={path} fill="none" stroke={A} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
          {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill={A} />)}
        </svg>
      );
    };

    const H = (props) => {
      const base = { fontFamily: "'Bebas Neue',sans-serif", fontSize: props.size || 24, color: props.color || "#fff", marginBottom: props.mb || 0, marginTop: props.mt || 0, letterSpacing: 1, lineHeight: 1.05 };
      return <div style={Object.assign(base, props.style || {})}>{props.children}</div>;
    };

    const Card = (props) => {
      const base = { background: CARD, border: "1px solid " + BDR, borderRadius: 16, padding: 18 };
      return <div onClick={props.onClick} style={Object.assign(base, props.style || {})}>{props.children}</div>;
    };

    const Btn = (props) => {

      const f = (k, v) => setForm((p) => { const n = Object.assign({}, p); n[k] = v; return n; });
      const canSave = form.fastingStatus && form.energyLevel;
      const sleepColor = form.sleepScore >= 7 ? A : form.sleepScore >= 5 ? "#FFD700" : RED;
      const energyOptions = [{ e: "😴", l: "Wiped" }, { e: "😕", l: "Tired" }, { e: "😐", l: "OK" }, { e: "🙂", l: "Good" }, { e: "⚡", l: "Great" }];
      return (
        <div style={{ padding: "20px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
            <div onClick={props.onBack} style={{ width: 36, height: 36, borderRadius: "50%", background: C2, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 20, color: SOFT }}>‹</div>
            <div><div style={{ fontSize: 10, color: MUT, letterSpacing: 3, textTransform: "uppercase" }}>Daily Log</div><H size={28}>MORNING CHECK-IN 🌅</H></div>
          </div>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>LAST NIGHT'S SLEEP</H>
            <Slider label="Sleep Quality Score" value={form.sleepScore} onChange={(v) => f("sleepScore", v)} leftLabel="😩 Terrible" rightLabel="😴 Perfect" color={sleepColor} />
            <Stepper label="Times You Woke Up During the Night" value={form.timesWoken} onChange={(v) => f("timesWoken", v)} />
            <div><div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>Sleep Notes <span style={{ color: MUT, fontWeight: 400 }}>(optional)</span></div><textarea rows={2} placeholder="e.g. restless, vivid dreams, snoring worse..." value={form.sleepNotes} onChange={(e) => f("sleepNotes", e.target.value)} /></div>
          </Card>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>THIS MORNING</H>
            <EmojiRow label="Morning Energy Level" value={form.energyLevel} onChange={(v) => f("energyLevel", v)} options={energyOptions} />
            <Chips label="Fasting Window — Did You Complete It?" value={form.fastingStatus} onChange={(v) => f("fastingStatus", v)} multi={false} options={["✅ Yes, nailed it", "⚡ Partial", "❌ No"]} />
            <Divider label="optional" />
            <div><div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>Morning Weight (lbs)</div><input type="number" placeholder="Log your weight to auto-sync..." value={form.morningWeight} onChange={(e) => f("morningWeight", e.target.value)} /></div>
          </Card>
          <Btn full disabled={!canSave} onClick={() => props.onSave(Object.assign({}, form, { timestamp: new Date().toISOString() }))}>SAVE MORNING CHECK-IN ✓</Btn>
          {!canSave && <p style={{ fontSize: 12, color: MUT, textAlign: "center", marginTop: 10 }}>Complete energy level and fasting status to save</p>}
        </div>
      );
    };

    const EveningCheckin = (props) => {
      const defaults = { stressLevel: 5, activityLevel: null, tiredness: 5, exerciseDone: [], cravings: null, mood: null, dayNotes: "" };
      const [form, setForm] = useState(props.existing || defaults);
      const f = (k, v) => setForm((p) => { const n = Object.assign({}, p); n[k] = v; return n; });
      const canSave = form.activityLevel && form.cravings && form.mood;
      const stressColor = form.stressLevel <= 4 ? A : form.stressLevel <= 7 ? "#FFD700" : RED;
      const tiredColor = form.tiredness <= 4 ? A : form.tiredness <= 7 ? "#FFD700" : RED;
      const moodOptions = [{ e: "😞", l: "Rough" }, { e: "😕", l: "Meh" }, { e: "😐", l: "Okay" }, { e: "🙂", l: "Good" }, { e: "😁", l: "Great" }];
      return (
        <div style={{ padding: "20px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
            <div onClick={props.onBack} style={{ width: 36, height: 36, borderRadius: "50%", background: C2, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 20, color: SOFT }}>‹</div>
            <div><div style={{ fontSize: 10, color: MUT, letterSpacing: 3, textTransform: "uppercase" }}>Daily Log</div><H size={28}>EVENING CHECK-IN 🌙</H></div>
          </div>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>TODAY'S STRESS & WELLBEING</H>
            <Slider label="Stress Level Today" value={form.stressLevel} onChange={(v) => f("stressLevel", v)} leftLabel="😌 Totally calm" rightLabel="😤 Overwhelmed" color={stressColor} />
            <Slider label="How Tired Did You Feel Today?" value={form.tiredness} onChange={(v) => f("tiredness", v)} leftLabel="⚡ Energized" rightLabel="💀 Exhausted" color={tiredColor} />
            <EmojiRow label="Overall Mood Today" value={form.mood} onChange={(v) => f("mood", v)} options={moodOptions} />
          </Card>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>MOVEMENT & ACTIVITY</H>
            <Chips label="Overall Activity Level Today" value={form.activityLevel} onChange={(v) => f("activityLevel", v)} multi={false} options={["Sedentary", "Light", "Moderate", "Active", "Very Active"]} />
            <Chips label="Exercise Completed (select all)" value={form.exerciseDone} onChange={(v) => f("exerciseDone", v)} multi={true} options={["🚶 Walk", "🏃 Run", "🚴 Peloton", "💪 Bodyweight", "🏋️ Other"]} />
          </Card>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>CRAVINGS & NOTES</H>
            <Chips label="Sugar / Soda Cravings Today" value={form.cravings} onChange={(v) => f("cravings", v)} multi={false} options={["None 🙌", "Mild 😐", "Strong 😬", "Gave In 😔"]} />
            <Divider label="optional" />
            <div><div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>Day Notes</div><textarea rows={3} placeholder="How did today go? Anything worth noting..." value={form.dayNotes} onChange={(e) => f("dayNotes", e.target.value)} /></div>
          </Card>
          <Btn full disabled={!canSave} onClick={() => props.onSave(Object.assign({}, form, { timestamp: new Date().toISOString() }))}>SAVE EVENING CHECK-IN ✓</Btn>
          {!canSave && <p style={{ fontSize: 12, color: MUT, textAlign: "center", marginTop: 10 }}>Complete activity, cravings, and mood to save</p>}
        </div>
      );
    };

    const HistoryScreen = (props) => {
      const { checkins, weightLog, profile } = props;
      const sortedDates = Object.keys(checkins).sort((a, b) => b.localeCompare(a)).slice(0, 60);
      const insights = buildInsights(checkins);
      const chartData = weightLog.slice(-30);
      return (
        <div style={{ padding: "20px 16px" }}>
          <H size={40} color="#fff" mb={4}>HISTORY &<br/><span style={{ color: A }}>INSIGHTS</span></H>
          <p style={{ color: MUT, fontSize: 13, marginBottom: 24, lineHeight: 1.6 }}>Your patterns reveal your progress. Data beats guesswork.</p>
          {weightLog.length > 1 ? (
            <Card style={{ marginBottom: 16 }}>
              <H size={16} color={A} mb={16}>WEIGHT TREND</H>
              <WeightChart data={chartData} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 12 }}>
                <span style={{ color: MUT }}>Start: <strong style={{ color: "#fff" }}>{profile.startWeight}</strong></span>
                {weightLog.length > 0 && <span style={{ color: A, fontWeight: 600 }}>Latest: {weightLog[weightLog.length - 1].weight} lbs</span>}
                <span style={{ color: MUT }}>Goal: <strong style={{ color: "#fff" }}>{profile.goalWeight}</strong></span>
              </div>
            </Card>
          ) : (
            <Card style={{ marginBottom: 16, textAlign: "center", padding: 32 }}><div style={{ fontSize: 36, marginBottom: 10 }}>⚖️</div><div style={{ color: SOFT, fontSize: 14 }}>Log your weight a few times to see your trend chart.</div></Card>
          )}
          {insights.length > 0 && (
            <Card style={{ marginBottom: 16 }}>
              <H size={16} color={A} mb={4}>✨ YOUR PERSONAL INSIGHTS</H>
              <p style={{ fontSize: 12, color: MUT, marginBottom: 14, lineHeight: 1.5 }}>Patterns discovered from your check-in data</p>
              {insights.map((ins, i) => (
                <div key={i} style={{ display: "flex", gap: 14, padding: "12px 0", borderBottom: i < insights.length - 1 ? "1px solid " + BDR : "none" }}>
                  <span style={{ fontSize: 24, flexShrink: 0 }}>{ins.icon}</span>
                  <p style={{ fontSize: 13, color: SOFT, lineHeight: 1.65 }}>{ins.text}</p>
                </div>
              ))}
            </Card>
          )}
          {insights.length === 0 && Object.keys(checkins).length < 3 && (
            <div style={{ background: "rgba(0,232,122,0.05)", border: "1px solid rgba(0,232,122,0.15)", borderRadius: 12, padding: 16, marginBottom: 16, textAlign: "center" }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>🧬</div>
              <div style={{ fontSize: 13, color: A, fontWeight: 600 }}>Insights unlock after 3+ days</div>
              <div style={{ fontSize: 12, color: MUT, marginTop: 6, lineHeight: 1.5 }}>Keep completing check-ins and we'll surface patterns in your sleep, stress, and weight data.</div>
            </div>
          )}
          <H size={24} color="#fff" mb={14}>CHECK-IN LOG</H>
          {sortedDates.length === 0 ? (
            <Card style={{ textAlign: "center", padding: 32 }}><div style={{ fontSize: 36, marginBottom: 10 }}>📋</div><div style={{ color: SOFT, fontSize: 14 }}>Complete your first check-in to start building your log.</div></Card>
          ) : sortedDates.map((date) => {
            const c = checkins[date];
            return (
              <Card key={date} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 18 }}>{fmtDate(date)}</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {c.morning && <span style={{ fontSize: 10, background: "rgba(0,232,122,0.1)", color: A, border: "1px solid rgba(0,232,122,0.25)", borderRadius: 20, padding: "2px 9px" }}>🌅 AM</span>}
                    {c.evening && <span style={{ fontSize: 10, background: "rgba(0,232,122,0.1)", color: A, border: "1px solid rgba(0,232,122,0.25)", borderRadius: 20, padding: "2px 9px" }}>🌙 PM</span>}
                  </div>
                </div>
                {c.morning && <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: c.evening ? 8 : 0 }}>
                  <span style={{ fontSize: 12, color: SOFT }}>💤 Sleep: <strong style={{ color: "#fff" }}>{c.morning.sleepScore}/10</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>🌙 Woke: <strong style={{ color: "#fff" }}>{c.morning.timesWoken}x</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>⚡ Energy: <strong style={{ color: "#fff" }}>{energyLabels[c.morning.energyLevel] || "–"}</strong></span>
                </div>}
                {c.evening && <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                  <span style={{ fontSize: 12, color: SOFT }}>🧠 Stress: <strong style={{ color: "#fff" }}>{c.evening.stressLevel}/10</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>😴 Tired: <strong style={{ color: "#fff" }}>{c.evening.tiredness}/10</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>🏃 <strong style={{ color: "#fff" }}>{c.evening.activityLevel}</strong></span>
                  {c.evening.mood && <span style={{ fontSize: 12, color: SOFT }}>Mood: <strong style={{ color: "#fff" }}>{moodLabels[c.evening.mood]}</strong></span>}
                </div>}
                {c.morning && c.morning.sleepNotes && <p style={{ fontSize: 11, color: MUT, marginTop: 8, fontStyle: "italic" }}>"{c.morning.sleepNotes}"</p>}
                {c.evening && c.evening.dayNotes && <p style={{ fontSize: 11, color: MUT, marginTop: 8, fontStyle: "italic" }}>"{c.evening.dayNotes}"</p>}
              </Card>
            );
          })}
        </div>
      );
    };

    function App() {
      const [profile, setProfile] = useState(() => db.get("profile"));
      const [checkins, setCheckins] = useState(() => db.get("checkins") || {});
      const [weightLog, setWeightLog] = useState(() => db.get("weightLog") || []);
      const [tab, setTab] = useState("home");

      const saveProfile = (p) => {
        setProfile(p); db.set("profile", p);
        const initLog = [{ date: p.startDate, weight: p.startWeight }];
        setWeightLog(initLog); db.set("weightLog", initLog);
      };

      const saveCheckin = (date, type, data) => {
        const newForDate = Object.assign({}, checkins[date] || {});
        newForDate[type] = data;
        const updated = Object.assign({}, checkins);
        updated[date] = newForDate;
        setCheckins(updated); db.set("checkins", updated);
        if (type === "morning" && data.morningWeight) {
          const filtered = weightLog.filter((w) => w.date !== date);
          filtered.push({ date: date, weight: +data.morningWeight });
          filtered.sort((a, b) => a.date.localeCompare(b.date));
          setWeightLog(filtered); db.set("weightLog", filtered);
          const up = Object.assign({}, profile, { currentWeight: +data.morningWeight });
          setProfile(up); db.set("profile", up);
        }
      };

      const addWeight = (weight) => {
        const t = localToday();
        const filtered = weightLog.filter((w) => w.date !== t);
        filtered.push({ date: t, weight: parseFloat(weight) });
        filtered.sort((a, b) => a.date.localeCompare(b.date));
        setWeightLog(filtered); db.set("weightLog", filtered);
        const up = Object.assign({}, profile, { currentWeight: parseFloat(weight) });
        setProfile(up); db.set("profile", up);
      };

      if (!profile) return <ProfileSetup onSave={saveProfile} />;

      const t = localToday();
      const todayCheckin = checkins[t] || {};
      const morningDone = !!todayCheckin.morning;
      const eveningDone = !!todayCheckin.evening;

      return (
        <AppShell tab={tab} setTab={setTab} morningDone={morningDone} eveningDone={eveningDone}>
          {tab === "home" && <HomeScreen profile={profile} checkins={checkins} weightLog={weightLog} morningDone={morningDone} eveningDone={eveningDone} setTab={setTab} addWeight={addWeight} />}
          {tab === "morning" && <MorningCheckin existing={todayCheckin.morning} onSave={(d) => { saveCheckin(t, "morning", d); setTab("home"); }} onBack={() => setTab("home")} />}
          {tab === "evening" && <EveningCheckin existing={todayCheckin.evening} onSave={(d) => { saveCheckin(t, "evening", d); setTab("home"); }} onBack={() => setTab("home")} />}
          {tab === "history" && <HistoryScreen checkins={checkins} weightLog={weightLog} profile={profile} />}
        </AppShell>
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (e) {
      document.getElementById('root').innerHTML = '<div class="err"><h2>App Error</h2><pre>' + (e.message || e) + '</pre></div>';
    }
  </script>
</body>
</html>
