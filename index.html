    const fmtDate = (s) => { try{return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}catch(e){return s;} };

    const daysSinceStart = (startDate) => { if(!startDate)return 0; const s=new Date(startDate+"T12:00:00"); return Math.floor((new Date()-s)/(1000*60*60*24)); };

    const calcStreak = (checkins) => {
      let streak=0; const d=new Date();
      for(let i=0;i<365;i++){
        const s=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        const c=checkins[s]||{};
        if(i===0){if(c.morning||c.evening){streak++;d.setDate(d.getDate()-1);continue;}else break;}
        if(c.morning&&c.evening){streak++;d.setDate(d.getDate()-1);}else break;

      return streak;
    };

    const get7DayTrends = (checkins) => {
      const days=[]; const now=new Date();
      for(let i=6;i>=0;i--){const dd=new Date(now);dd.setDate(now.getDate()-i);const s=dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");days.push(Object.assign({date:s},checkins[s]||{}));}

      }
      const pairs=allDates.filter((d)=>{const nd=new Date(d+"T12:00:00");nd.setDate(nd.getDate()+1);const next=nd.toISOString().split("T")[0];return checkins[d]&&checkins[d].morning&&checkins[d].morning.sleepScore&&checkins[next]&&checkins[next].evening&&checkins[next].evening.tiredness;});

      if(week<=9){const s=[{icon:"🚶",title:"Recovery Walk",duration:30,details:"30-min walk. Your body is transforming — let it recover.",intensity:"Low"},{icon:"🏃",title:"Run Intervals",duration:30,details:"5-min warm-up. Then: 3-min jog / 90-sec walk × 5 rounds. 5-min cool-down.",intensity:"High"},{icon:"🚴",title:"Peloton HIIT",duration:30,details:"30-min HIIT ride. Intervals of high-intensity effort with recovery. Search 'Beginner HIIT'.",intensity:"High"},{icon:"🚶",title:"Lunch Walk (Office)",duration:25,details:"Office day — active recovery walk. Stay consistent.",intensity:"Low"},{icon:"💪",title:"Full-Body Circuit",duration:30,details:"Push-ups 3x12 · Walking lunges 3x10/leg · Glute bridges 3x12 · Plank 3x30sec · Burpees 3x8.",intensity:"Mod-High"},{icon:"🏃",title:"Run Intervals",duration:32,details:"5-min warm-up. Then: 5-min jog / 2-min walk × 4 rounds. 5-min cool-down.",intensity:"High"},{icon:"🚴",title:"Long Endurance Ride",duration:45,details:"45-min endurance ride. This builds your metabolic engine.",intensity:"Moderate"}];return s[dow];}

    };

    // ── FASTING PLAN ENGINE ──────────────────────────────────

      const isExtWk=week>=4&&(week-4)%4===0; const is72=week>=8&&(week-8)%8===0;
      if(isExtWk&&dow===5)return{type:"extended_start",title:is72?"72-Hour Fast Begins Tonight":"48-Hour Fast Begins Tonight",icon:"🔋",eatWindow:"11:00 AM – 6:00 PM",fastDuration:is72?"72 hours":"48 hours",tips:"Last meal by 6 PM. Eat protein-rich + healthy fats for satiety. Stock up on sea salt, magnesium, sparkling water. Black coffee allowed during fast.",phase:is72?"Extended 72-Hour":"Extended 48-Hour"};

    // ── SVG Weight Chart ─────────────────────────────────────

                  <span style={{fontSize:11,color:SOFT}}>😴 Tired: <strong style={{color:"#fff"}}>{c.evening.tiredness}/10</strong></span>
                  <span style={{fontSize:11,color:SOFT}}>🏃 <strong style={{color:"#fff"}}>{c.evening.activityLevel}</strong></span>
                  {c.evening.mood&&<span style={{fontSize:11,color:SOFT}}>Mood: <strong style={{color:"#fff"}}>{moodLabels[c.evening.mood]}</strong></span>}
                </div>}
                {c.morning&&c.morning.sleepNotes&&<p style={{fontSize:11,color:MUT,marginTop:6,fontStyle:"italic"}}>"{c.morning.sleepNotes}"</p>}
                {c.evening&&c.evening.dayNotes&&<p style={{fontSize:11,color:MUT,marginTop:6,fontStyle:"italic"}}>"{c.evening.dayNotes}"</p>}
              </Card>
            );
          })}
        </div>
      );
    };

    // ── Root App ─────────────────────────────────────────────
    function App() {
      const [authStatus,setAuthStatus]=useState("loading");
      const [uid,setUid]=useState(null);
      const [userEmail,setUserEmail]=useState(null);
      const [userPhoto,setUserPhoto]=useState(null);
      const [profile,setProfile]=useState(null);
      const [checkins,setCheckins]=useState({});
      const [weightLog,setWeightLog]=useState([]);
      const [tab,setTab]=useState("home");
      const [signInError,setSignInError]=useState(null);

      useEffect(()=>{
        let unsub=null;
        const poll=setInterval(()=>{
          if(window._fbReady){
            clearInterval(poll);
            if(window._fb){
              unsub=window._fb.onAuth(async(user)=>{
                if(user){
                  setUid(user.uid); setUserEmail(user.email); setUserPhoto(user.photoURL);
                  const cloud=await window._fb.load(user.uid);
                  if(cloud&&cloud.profile){
                    setProfile(cloud.profile); setCheckins(cloud.checkins||{}); setWeightLog(cloud.weightLog||[]);
                  } else {
                    const lp=local.get("p_"+user.uid);
                    if(lp){setProfile(lp);setCheckins(local.get("c_"+user.uid)||{});setWeightLog(local.get("w_"+user.uid)||[]);}
                  }
                  setAuthStatus("ready");
                } else { setUid(null);setProfile(null);setCheckins({});setWeightLog([]);setAuthStatus("signedout"); }
              });
            } else { setAuthStatus("signedout"); }
          }
        },50);
        return()=>{ clearInterval(poll); if(unsub)unsub(); };
      },[]);

      const handleSignIn=async()=>{
        setSignInError(null);
        try{ await window._fb.signIn(); }
        catch(e){ setSignInError("Sign-in failed. Make sure pop-ups are allowed and try again."); }
      };

      const handleSignOut=async()=>{
        try{ await window._fb.signOut(); setTab("home"); }catch(e){}
      };

      const saveProfile=(p)=>{
        setProfile(p);
        const initLog=[{date:p.startDate,weight:p.startWeight}];
        setWeightLog(initLog);
        cloudSave(uid,p,checkins,initLog);
      };

      const saveCheckin=(date,type,data)=>{
        const newC=Object.assign({},checkins);
        newC[date]=Object.assign({},newC[date]||{});newC[date][type]=data;
        setCheckins(newC);
        let np=profile,nw=weightLog;
        if(type==="morning"&&data.morningWeight){
          const f=weightLog.filter((w)=>w.date!==date);f.push({date,weight:+data.morningWeight});f.sort((a,b)=>a.date.localeCompare(b.date));
          nw=f;setWeightLog(nw);np=Object.assign({},profile,{currentWeight:+data.morningWeight});setProfile(np);
        }
        cloudSave(uid,np,newC,nw);
      };

      const addWeight=(weight)=>{
        const t=localToday();
        const f=weightLog.filter((w)=>w.date!==t);f.push({date:t,weight:parseFloat(weight)});f.sort((a,b)=>a.date.localeCompare(b.date));
        const np=Object.assign({},profile,{currentWeight:parseFloat(weight)});
        setWeightLog(f);setProfile(np);cloudSave(uid,np,checkins,f);
      };

      if(authStatus==="loading")return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:BG,flexDirection:"column",gap:16}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:48,color:A}}>GET FIT.</div><div style={{color:MUT,fontSize:13}}>Loading your data...</div></div>;
      if(authStatus==="signedout")return<SignInScreen onSignIn={handleSignIn} error={signInError}/>;
      if(!profile)return<ProfileSetup onSave={saveProfile} userEmail={userEmail} userPhoto={userPhoto} onSignOut={handleSignOut}/>;

      const t=localToday();
      const todayCheckin=checkins[t]||{};
      const morningDone=!!todayCheckin.morning,eveningDone=!!todayCheckin.evening;

      return(
        <AppShell tab={tab} setTab={setTab} morningDone={morningDone} eveningDone={eveningDone}>
          {tab==="home"&&<HomeScreen profile={profile} checkins={checkins} weightLog={weightLog} morningDone={morningDone} eveningDone={eveningDone} setTab={setTab} addWeight={addWeight} userPhoto={userPhoto} onSignOut={handleSignOut}/>}
          {tab==="morning"&&<MorningCheckin existing={todayCheckin.morning} onSave={(d)=>{saveCheckin(t,"morning",d);setTab("home");}} onBack={()=>setTab("home")}/>}
          {tab==="evening"&&<EveningCheckin existing={todayCheckin.evening} onSave={(d)=>{saveCheckin(t,"evening",d);setTab("home");}} onBack={()=>setTab("home")}/>}
          {tab==="exercise"&&<ExercisePlanScreen profile={profile}/>}
          {tab==="fasting"&&<FastingPlanScreen profile={profile}/>}
          {tab==="history"&&<HistoryScreen checkins={checkins} weightLog={weightLog} profile={profile}/>}
        </AppShell>
      );
    }

    try{ ReactDOM.createRoot(document.getElementById('root')).render(<App/>); }
    catch(e){ document.getElementById('root').innerHTML='<div class="err"><h2>App Error</h2><pre>'+(e.message||e)+'</pre></div>'; }
  </script>
</body>
</html>
