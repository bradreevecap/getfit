<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Get Fit. Live Longer.</title>

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Get Fit" />
  <meta name="theme-color" content="#0A0A0A" />

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%230A0A0A'/%3E%3Crect x='30' y='30' width='452' height='452' rx='90' fill='%23141414'/%3E%3Ctext x='256' y='200' font-family='Arial Black' font-size='130' font-weight='900' fill='%2300E87A' text-anchor='middle'%3EGF%3C/text%3E%3Ctext x='256' y='330' font-family='Arial' font-size='62' fill='%23444' text-anchor='middle'%3ELIVE%3C/text%3E%3Ctext x='256' y='400' font-family='Arial' font-size='62' fill='%2300E87A' text-anchor='middle'%3ELONGER%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0A0A0A; overscroll-behavior: none; }
    body { font-family: 'DM Sans', sans-serif; color: #fff; }
    #root { height: 100%; }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #2A2A2A; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #00E87A; cursor: pointer; border: 3px solid #0A0A0A; box-shadow: 0 0 0 2px #00E87A; }
    input[type=number], input[type=text] { background: #1C1C1C; border: 1px solid #2A2A2A; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; width: 100%; outline: none; -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number]:focus, input[type=text]:focus { border-color: #00E87A; }
    textarea { background: #1C1C1C; border: 1px solid #2A2A2A; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 12px 14px; width: 100%; outline: none; resize: none; }
    textarea:focus { border-color: #00E87A; }
    ::-webkit-scrollbar { width: 0; }
    .err { padding: 40px 20px; color: #fff; font-family: sans-serif; }
    .err h2 { color: #FF5555; margin-bottom: 12px; }
    .err pre { background: #1C1C1C; padding: 14px; border-radius: 8px; font-size: 11px; overflow: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#666;font-family:sans-serif;font-size:14px">Loading...</div></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const A = "#00E87A", BG = "#0A0A0A", CARD = "#141414", C2 = "#1C1C1C";
    const BDR = "#2A2A2A", MUT = "#666", SOFT = "#AAA", RED = "#FF5555";
    const energyLabels = ["","Wiped","Tired","OK","Good","Great"];
    const moodLabels   = ["","Rough","Meh","OK","Good","Great"];

    const db = {
      get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    const localToday = () => {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    };
    const bmi = (w, ft, ins) => {
      const h = (parseInt(ft)||0)*12 + (parseInt(ins)||0);
      if (!h || !w) return null;
      return +((w/(h*h))*703).toFixed(1);
    };
    const bmiLabel = (b) => {
      if (!b) return "";
      if (b < 18.5) return "Underweight"; if (b < 25) return "Normal";
      if (b < 30) return "Overweight";   if (b < 35) return "Obese I";
      if (b < 40) return "Obese II";     return "Obese III";
    };
    const bmiColor = (b) => { if (!b) return SOFT; if (b < 25) return A; if (b < 30) return "#FFD700"; return RED; };
    const fmtDate = (s) => { try { return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); } catch { return s; } };
    const greet = () => { const h = new Date().getHours(); return h<12?"Good Morning":h<17?"Good Afternoon":"Good Evening"; };

    const calcStreak = (checkins) => {
      let streak = 0;
      const d = new Date();
      for (let i = 0; i < 365; i++) {
        const s = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
        const c = checkins[s] || {};
        if (i===0) { if (c.morning||c.evening) { streak++; d.setDate(d.getDate()-1); continue; } else break; }
        if (c.morning && c.evening) { streak++; d.setDate(d.getDate()-1); } else break;
      }
      return streak;
    };

    const get7DayTrends = (checkins) => {
      const days = [];
      const now = new Date();
      for (let i = 6; i >= 0; i--) {
        const dd = new Date(now); dd.setDate(now.getDate()-i);
        const s = dd.getFullYear() + "-" + String(dd.getMonth()+1).padStart(2,"0") + "-" + String(dd.getDate()).padStart(2,"0");
        const entry = Object.assign({ date: s }, checkins[s] || {});
        days.push(entry);
      }
      const avg = (key, sub) => {
        const vals = days.map((d) => sub ? (d[sub] && d[sub][key]) : d[key]).filter((v) => v != null);
        return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : "--";
      };
      return {
        sleepAvg: avg("sleepScore","morning"),
        stressAvg: avg("stressLevel","evening"),
        tirednessAvg: avg("tiredness","evening"),
        activeDays: days.filter((d) => d.evening && d.evening.activityLevel && d.evening.activityLevel !== "Sedentary").length,
      };
    };

    const buildInsights = (checkins) => {
      const insights = [];
      const allDates = Object.keys(checkins).sort();
      if (allDates.length < 3) return insights;
      const exD  = allDates.filter((d) => checkins[d] && checkins[d].evening && checkins[d].evening.exerciseDone && checkins[d].evening.exerciseDone.length > 0);
      const noEx = allDates.filter((d) => checkins[d] && checkins[d].evening && (!checkins[d].evening.exerciseDone || checkins[d].evening.exerciseDone.length === 0));
      if (exD.length >= 2 && noEx.length >= 2) {
        const avgS = (arr) => {
          const vals = arr.map((d) => checkins[d] && checkins[d].evening && checkins[d].evening.stressLevel).filter(Boolean);
          return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1) : null;
        };
        const es = avgS(exD), ns = avgS(noEx);
        if (es && ns) insights.push({ icon:"🏃", text: "Your avg stress on exercise days was " + es + "/10, vs " + ns + "/10 on rest days. Movement is your stress medicine." });
      }
      return insights;
    };

    const WeightChart = ({ data }) => {
      if (!data || data.length < 2) return null;
      const W = 340, HT = 170, PX = 34, PY = 20;
      const weights = data.map((d) => d.weight);
      const minW = Math.min.apply(null, weights) - 3;
      const maxW = Math.max.apply(null, weights) + 3;
      const range = maxW - minW || 1;
      const xStep = (W - PX*2) / Math.max(1, data.length - 1);
      const pts = data.map((d, i) => ({
        x: PX + i * xStep,
        y: HT - PY - ((d.weight - minW) / range) * (HT - PY*2),
        weight: d.weight,
        date: d.date,
      }));
      const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + " " + p.y.toFixed(1)).join(" ");
      const gridRatios = [0, 0.25, 0.5, 0.75, 1];
      return (
        <svg viewBox={"0 0 " + W + " " + HT} style={{ width: "100%", height: HT }}>
          {gridRatios.map((r, i) => {
            const y = PY + r * (HT - PY*2);
            return <line key={i} x1={PX} y1={y} x2={W - PX} y2={y} stroke={BDR} strokeDasharray="3 3" strokeWidth="1" />;
          })}
          {gridRatios.map((r, i) => {
            const val = (maxW - r * range).toFixed(0);
            const y = PY + r * (HT - PY*2);
            return <text key={"t"+i} x={PX - 6} y={y + 3} fill={MUT} fontSize="9" textAnchor="end">{val}</text>;
          })}
          <path d={path} fill="none" stroke={A} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
          {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill={A} />)}
        </svg>
      );
    };

    const H = (props) => {
      const { children, size, color, mb, mt, style } = props;
      const base = { fontFamily: "'Bebas Neue',sans-serif", fontSize: size || 24, color: color || "#fff", marginBottom: mb || 0, marginTop: mt || 0, letterSpacing: 1, lineHeight: 1.05 };
      return <div style={Object.assign(base, style || {})}>{children}</div>;
    };

    const Card = (props) => {
      const base = { background: CARD, border: "1px solid " + BDR, borderRadius: 16, padding: 18 };
      return <div onClick={props.onClick} style={Object.assign(base, props.style || {})}>{props.children}</div>;
    };

    const Btn = (props) => {
      const variants = {
        primary: { background: A, color: "#000" },
        ghost: { background: C2, color: SOFT, border: "1px solid " + BDR },
      };
      const v = variants[props.variant || "primary"];
      const base = { padding: "13px 20px", borderRadius: 12, cursor: props.disabled ? "default" : "pointer", fontFamily: "'DM Sans',sans-serif", fontWeight: 600, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, opacity: props.disabled ? 0.4 : 1, width: props.full ? "100%" : undefined };
      return <div onClick={!props.disabled ? props.onClick : undefined} style={Object.assign(base, v, props.style || {})}>{props.children}</div>;
    };

    const Slider = (props) => {
      const { label, value, onChange, min, max, leftLabel, rightLabel, color } = props;
      return (
        <div style={{ marginBottom: 22 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 13, color: SOFT, fontWeight: 500 }}>{label}</span>
            <span style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 28, color: color || A, lineHeight: 1 }}>{value}</span>
          </div>
          <input type="range" min={min || 1} max={max || 10} value={value} onChange={(e) => onChange(+e.target.value)} />
          {(leftLabel || rightLabel) && <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}><span style={{ fontSize: 10, color: MUT }}>{leftLabel}</span><span style={{ fontSize: 10, color: MUT }}>{rightLabel}</span></div>}
        </div>
      );
    };

    const EmojiRow = (props) => {
      const { label, value, onChange, options } = props;
      return (
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>{label}</div>
          <div style={{ display: "flex", gap: 6 }}>
            {options.map((o, i) => (
              <div key={i} onClick={() => onChange(i+1)} style={{ flex: 1, background: value === i+1 ? "rgba(0,232,122,0.12)" : C2, border: "1px solid " + (value === i+1 ? A : BDR), borderRadius: 10, padding: "10px 2px", textAlign: "center", cursor: "pointer" }}>
                <div style={{ fontSize: 20 }}>{o.e}</div>
                <div style={{ fontSize: 9, color: value === i+1 ? A : MUT, marginTop: 3, lineHeight: 1.2 }}>{o.l}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const Chips = (props) => {
      const { label, value, onChange, options, multi } = props;
      const val = value || (multi ? [] : null);
      return (
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>{label}</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {options.map((o) => {
              const active = multi ? val.includes(o) : val === o;
              const handleClick = () => {
                if (multi) onChange(active ? val.filter((x) => x !== o) : val.concat(o));
                else onChange(o);
              };
              return <div key={o} onClick={handleClick} style={{ padding: "8px 14px", borderRadius: 20, border: "1px solid " + (active ? A : BDR), background: active ? "rgba(0,232,122,0.12)" : C2, color: active ? A : SOFT, fontSize: 13, fontWeight: 500, cursor: "pointer", whiteSpace: "nowrap" }}>{o}</div>;
            })}
          </div>
        </div>
      );
    };

    const Stepper = (props) => {
      const { label, value, onChange, min, max } = props;
      const lo = min || 0, hi = max || 15;
      return (
        <div style={{ marginBottom: 22 }}>
          <div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>{label}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 16, background: C2, border: "1px solid " + BDR, borderRadius: 12, padding: "8px 16px" }}>
            <div onClick={() => onChange(Math.max(lo, value-1))} style={{ width: 36, height: 36, borderRadius: 8, background: BDR, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 22, color: SOFT, userSelect: "none" }}>−</div>
            <div style={{ flex: 1, textAlign: "center", fontFamily: "'Bebas Neue',sans-serif", fontSize: 36, color: A, lineHeight: 1 }}>{value}{value === hi ? "+" : " "}</div>
            <div onClick={() => onChange(Math.min(hi, value+1))} style={{ width: 36, height: 36, borderRadius: 8, background: BDR, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 22, color: SOFT, userSelect: "none" }}>+</div>
          </div>
        </div>
      );
    };

    const Divider = (props) => (
      <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "20px 0" }}>
        <div style={{ flex: 1, height: 1, background: BDR }} />
        {props.label && <span style={{ fontSize: 11, color: MUT, textTransform: "uppercase", letterSpacing: 2, whiteSpace: "nowrap" }}>{props.label}</span>}
        <div style={{ flex: 1, height: 1, background: BDR }} />
      </div>
    );

    const ProfileSetup = (props) => {
      const [form, setForm] = useState({ name: "", startWeight: "303", goalWeight: "200", heightFt: "5", heightIn: "11" });
      const f = (k, v) => setForm((p) => { const n = Object.assign({}, p); n[k] = v; return n; });
      const currentBMI = bmi(+form.startWeight, form.heightFt, form.heightIn);
      const goalBMI = bmi(+form.goalWeight, form.heightFt, form.heightIn);
      const valid = form.name.trim() && form.startWeight && form.goalWeight && form.heightFt;
      const onStart = () => {
        props.onSave({ name: form.name.trim(), startWeight: +form.startWeight, currentWeight: +form.startWeight, goalWeight: +form.goalWeight, heightFt: form.heightFt, heightIn: form.heightIn, startDate: localToday() });
      };
      return (
        <div style={{ minHeight: "100vh", background: BG, overflowY: "auto" }}>
          <div style={{ maxWidth: 420, margin: "0 auto", padding: "40px 20px 100px" }}>
            <div style={{ textAlign: "center", marginBottom: 36 }}>
              <div style={{ fontSize: 11, letterSpacing: 4, color: A, textTransform: "uppercase", marginBottom: 12 }}>Welcome to</div>
              <H size={58} color="#fff" style={{ lineHeight: 0.95 }}>GET FIT.<br/><span style={{ color: A }}>LIVE LONGER.</span></H>
              <p style={{ color: SOFT, fontSize: 14, marginTop: 16, lineHeight: 1.7 }}>Your personal transformation tracker. Daily check-ins, sleep quality, and weight progress — all in one place.</p>
            </div>
            <Card style={{ marginBottom: 16 }}>
              <H size={20} color={A} mb={20}>YOUR PROFILE</H>
              <div style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 12, color: SOFT, marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Your Name</div>
                <input type="text" placeholder="e.g. John" value={form.name} onChange={(e) => f("name", e.target.value)} />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 18 }}>
                <div><div style={{ fontSize: 12, color: SOFT, marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Height (ft)</div><input type="number" placeholder="5" value={form.heightFt} onChange={(e) => f("heightFt", e.target.value)} /></div>
                <div><div style={{ fontSize: 12, color: SOFT, marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Height (in)</div><input type="number" placeholder="11" value={form.heightIn} onChange={(e) => f("heightIn", e.target.value)} /></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
                <div><div style={{ fontSize: 12, color: SOFT, marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Start Weight (lbs)</div><input type="number" placeholder="303" value={form.startWeight} onChange={(e) => f("startWeight", e.target.value)} /></div>
                <div><div style={{ fontSize: 12, color: SOFT, marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Goal Weight (lbs)</div><input type="number" placeholder="200" value={form.goalWeight} onChange={(e) => f("goalWeight", e.target.value)} /></div>
              </div>
              {currentBMI && (
                <div style={{ background: C2, border: "1px solid " + BDR, borderRadius: 12, padding: 16, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: MUT, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 6 }}>Starting BMI</div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 36, color: bmiColor(currentBMI), lineHeight: 1 }}>{currentBMI}</div>
                    <div style={{ fontSize: 11, color: bmiColor(currentBMI), marginTop: 4 }}>{bmiLabel(currentBMI)}</div>
                  </div>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: MUT, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 6 }}>Goal BMI</div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 36, color: bmiColor(goalBMI), lineHeight: 1 }}>{goalBMI || "--"}</div>
                    <div style={{ fontSize: 11, color: bmiColor(goalBMI), marginTop: 4 }}>{bmiLabel(goalBMI)}</div>
                  </div>
                </div>
              )}
            </Card>
            <Btn full disabled={!valid} onClick={onStart}>🚀 START MY JOURNEY</Btn>
          </div>
        </div>
      );
    };

    const AppShell = (props) => {
      const nav = [
        { key: "home", icon: "🏠", label: "Home" },
        { key: "morning", icon: "🌅", label: "Morning", badge: !props.morningDone },
        { key: "evening", icon: "🌙", label: "Evening", badge: !props.eveningDone },
        { key: "history", icon: "📊", label: "History" },
      ];
      return (
        <div style={{ maxWidth: 420, margin: "0 auto", height: "100vh", background: BG, display: "flex", flexDirection: "column", position: "relative" }}>
          <div style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", paddingBottom: 82 }}>{props.children}</div>
          <div style={{ flexShrink: 0, background: "rgba(10,10,10,0.97)", backdropFilter: "blur(20px)", borderTop: "1px solid " + BDR, display: "flex", zIndex: 100 }}>
            {nav.map((n) => (
              <div key={n.key} onClick={() => props.setTab(n.key)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "10px 0 14px", cursor: "pointer", position: "relative" }}>
                {n.badge && <div style={{ position: "absolute", top: 8, right: "calc(50% - 16px)", width: 7, height: 7, borderRadius: "50%", background: A }} />}
                <div style={{ fontSize: 20, marginBottom: 2 }}>{n.icon}</div>
                <div style={{ fontSize: 10, color: props.tab === n.key ? A : MUT, fontWeight: props.tab === n.key ? 600 : 400, letterSpacing: 0.5 }}>{n.label}</div>
                {props.tab === n.key && <div style={{ position: "absolute", bottom: 0, left: "50%", transform: "translateX(-50%)", width: 24, height: 2, background: A, borderRadius: 1 }} />}
              </div>
            ))}
          </div>
        </div>
      );
    };

    const HomeScreen = (props) => {
      const { profile, checkins, morningDone, eveningDone, setTab, addWeight } = props;
      const [showModal, setShowModal] = useState(false);
      const [newWeight, setNewWeight] = useState(String(profile.currentWeight || ""));
      const trends = get7DayTrends(checkins);
      const streak = calcStreak(checkins);
      const pct = Math.min(100, Math.max(0, ((profile.startWeight - profile.currentWeight) / (profile.startWeight - profile.goalWeight)) * 100));
      const lost = +(profile.startWeight - profile.currentWeight).toFixed(1);
      const toGo = +(profile.currentWeight - profile.goalWeight).toFixed(1);
      const currentBMI = bmi(profile.currentWeight, profile.heightFt, profile.heightIn);
      const milestones = [5, 10, 25, 50, 75, 100];
      let nextMs = 100;
      for (let i = 0; i < milestones.length; i++) { if (milestones[i] > lost) { nextMs = milestones[i]; break; } }
      const bothDone = morningDone && eveningDone;

      const trendCards = [
        { label: "Avg Sleep Score", val: trends.sleepAvg, icon: "😴", good: (v) => +v >= 7 },
        { label: "Avg Stress", val: trends.stressAvg, icon: "🧠", good: (v) => +v <= 4 },
        { label: "Avg Tiredness", val: trends.tirednessAvg, icon: "⚡", good: (v) => +v <= 4 },
        { label: "Active Days", val: trends.activeDays + "/7", icon: "🏃", good: (v) => parseInt(v) >= 4 },
      ];

      const checkinItems = [
        { key: "morning", done: morningDone, icon: "🌅", label: "Morning Check-In", sub: "Sleep quality · Energy · Fasting" },
        { key: "evening", done: eveningDone, icon: "🌙", label: "Evening Check-In", sub: "Stress · Activity · Cravings · Mood" },
      ];

      return (
        <div style={{ padding: "20px 16px" }}>
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, color: MUT, letterSpacing: 3, textTransform: "uppercase" }}>{new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}</div>
            <H size={36} color="#fff" mt={4}>{greet()}, <span style={{ color: A }}>{profile.name.split(" ")[0]}</span></H>
          </div>
          <Card style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
              <div>
                <div style={{ fontSize: 10, color: MUT, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>Current Weight</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 5 }}>
                  <span style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 52, color: "#fff", lineHeight: 1 }}>{profile.currentWeight}</span>
                  <span style={{ fontSize: 14, color: SOFT }}>lbs</span>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: MUT, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>BMI</div>
                <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 30, color: bmiColor(currentBMI) }}>{currentBMI || "--"}</div>
                <div style={{ fontSize: 10, color: bmiColor(currentBMI) }}>{bmiLabel(currentBMI)}</div>
              </div>
            </div>
            <div style={{ background: BDR, borderRadius: 99, height: 8, marginBottom: 10, overflow: "hidden" }}>
              <div style={{ height: "100%", borderRadius: 99, background: "linear-gradient(90deg," + A + ",#00ffaa)", width: pct + "%", transition: "width 0.6s" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 12 }}>
              <span style={{ color: MUT }}>Start: {profile.startWeight}</span>
              <span style={{ color: A, fontWeight: 600 }}>↓ {lost} lbs lost</span>
              <span style={{ color: MUT }}>Goal: {profile.goalWeight}</span>
            </div>
            {lost < nextMs && <div style={{ background: "rgba(0,232,122,0.06)", border: "1px solid rgba(0,232,122,0.15)", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: A, marginBottom: 12 }}>🎯 Next milestone: <strong>{nextMs} lbs lost</strong> — only {(nextMs - lost).toFixed(1)} lbs away!</div>}
            <Btn variant="ghost" full onClick={() => setShowModal(true)} style={{ fontSize: 13, padding: "10px 16px" }}>⚖️ Log Today's Weight</Btn>
          </Card>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
            <Card style={{ textAlign: "center", padding: 16 }}>
              <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 52, color: A, lineHeight: 1 }}>{streak}</div>
              <div style={{ fontSize: 10, color: MUT, textTransform: "uppercase", letterSpacing: 1.5, marginTop: 6 }}>Day Streak 🔥</div>
            </Card>
            <Card style={{ textAlign: "center", padding: 16 }}>
              <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 52, color: SOFT, lineHeight: 1 }}>{toGo}</div>
              <div style={{ fontSize: 10, color: MUT, textTransform: "uppercase", letterSpacing: 1.5, marginTop: 6 }}>lbs to goal</div>
            </Card>
          </div>
          <Card style={{ marginBottom: 14 }}>
            <H size={18} color={A} mb={16}>TODAY'S CHECK-INS</H>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {checkinItems.map((item) => (
                <div key={item.key} onClick={() => setTab(item.key)} style={{ display: "flex", alignItems: "center", gap: 12, background: C2, border: "1px solid " + (item.done ? A : BDR), borderRadius: 12, padding: 14, cursor: "pointer" }}>
                  <div style={{ width: 38, height: 38, borderRadius: "50%", background: item.done ? "rgba(0,232,122,0.15)" : BDR, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>{item.done ? "✅" : item.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: item.done ? A : "#fff" }}>{item.label}</div>
                    <div style={{ fontSize: 12, color: MUT, marginTop: 2 }}>{item.done ? "Completed · Tap to review" : item.sub}</div>
                  </div>
                  <div style={{ fontSize: 18, color: MUT }}>›</div>
                </div>
              ))}
            </div>
            {bothDone && <div style={{ marginTop: 14, textAlign: "center", padding: 16, background: "rgba(0,232,122,0.08)", border: "1px solid rgba(0,232,122,0.2)", borderRadius: 12 }}><div style={{ fontSize: 28 }}>🎉</div><div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 20, color: A, marginTop: 6 }}>BOTH CHECK-INS DONE!</div><div style={{ fontSize: 12, color: MUT, marginTop: 4 }}>Streak maintained · Keep going</div></div>}
          </Card>
          <Card>
            <H size={18} color={A} mb={16}>7-DAY TRENDS</H>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {trendCards.map((t, i) => {
                const isGood = t.val !== "--" && t.good(t.val);
                const col = t.val === "--" ? MUT : isGood ? A : "#FFD700";
                return <div key={i} style={{ background: C2, border: "1px solid " + BDR, borderRadius: 12, padding: 14, textAlign: "center" }}><div style={{ fontSize: 24, marginBottom: 6 }}>{t.icon}</div><div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 30, color: col, lineHeight: 1 }}>{t.val}</div><div style={{ fontSize: 10, color: MUT, marginTop: 5, lineHeight: 1.4 }}>{t.label}</div></div>;
              })}
            </div>
          </Card>
          {showModal && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 200 }} onClick={() => setShowModal(false)}>
              <div style={{ background: CARD, border: "1px solid " + BDR, borderRadius: "20px 20px 0 0", padding: 28, width: "100%", maxWidth: 420 }} onClick={(e) => e.stopPropagation()}>
                <H size={26} color={A} mb={6}>LOG YOUR WEIGHT</H>
                <p style={{ fontSize: 13, color: MUT, marginBottom: 18 }}>Best logged first thing in the morning, same conditions each time.</p>
                <input type="number" value={newWeight} onChange={(e) => setNewWeight(e.target.value)} placeholder="Enter weight in lbs" style={{ fontSize: 28, textAlign: "center", padding: 16, marginBottom: 16 }} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Btn variant="ghost" onClick={() => setShowModal(false)}>Cancel</Btn>
                  <Btn disabled={!newWeight} onClick={() => { if (newWeight) { addWeight(newWeight); setShowModal(false); } }}>Save ✓</Btn>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const MorningCheckin = (props) => {
      const defaults = { sleepScore: 7, timesWoken: 2, sleepNotes: "", fastingStatus: null, energyLevel: null, morningWeight: "" };
      const [form, setForm] = useState(props.existing || defaults);
      const f = (k, v) => setForm((p) => { const n = Object.assign({}, p); n[k] = v; return n; });
      const canSave = form.fastingStatus && form.energyLevel;
      const sleepColor = form.sleepScore >= 7 ? A : form.sleepScore >= 5 ? "#FFD700" : RED;
      const energyOptions = [{ e: "😴", l: "Wiped" }, { e: "😕", l: "Tired" }, { e: "😐", l: "OK" }, { e: "🙂", l: "Good" }, { e: "⚡", l: "Great" }];
      return (
        <div style={{ padding: "20px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
            <div onClick={props.onBack} style={{ width: 36, height: 36, borderRadius: "50%", background: C2, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 20, color: SOFT }}>‹</div>
            <div><div style={{ fontSize: 10, color: MUT, letterSpacing: 3, textTransform: "uppercase" }}>Daily Log</div><H size={28}>MORNING CHECK-IN 🌅</H></div>
          </div>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>LAST NIGHT'S SLEEP</H>
            <Slider label="Sleep Quality Score" value={form.sleepScore} onChange={(v) => f("sleepScore", v)} leftLabel="😩 Terrible" rightLabel="😴 Perfect" color={sleepColor} />
            <Stepper label="Times You Woke Up During the Night" value={form.timesWoken} onChange={(v) => f("timesWoken", v)} />
            <div><div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>Sleep Notes <span style={{ color: MUT, fontWeight: 400 }}>(optional)</span></div><textarea rows={2} placeholder="e.g. restless, vivid dreams, snoring worse..." value={form.sleepNotes} onChange={(e) => f("sleepNotes", e.target.value)} /></div>
          </Card>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>THIS MORNING</H>
            <EmojiRow label="Morning Energy Level" value={form.energyLevel} onChange={(v) => f("energyLevel", v)} options={energyOptions} />
            <Chips label="Fasting Window — Did You Complete It?" value={form.fastingStatus} onChange={(v) => f("fastingStatus", v)} multi={false} options={["✅ Yes, nailed it", "⚡ Partial", "❌ No"]} />
            <Divider label="optional" />
            <div><div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>Morning Weight (lbs)</div><input type="number" placeholder="Log your weight to auto-sync..." value={form.morningWeight} onChange={(e) => f("morningWeight", e.target.value)} /></div>
          </Card>
          <Btn full disabled={!canSave} onClick={() => props.onSave(Object.assign({}, form, { timestamp: new Date().toISOString() }))}>SAVE MORNING CHECK-IN ✓</Btn>
          {!canSave && <p style={{ fontSize: 12, color: MUT, textAlign: "center", marginTop: 10 }}>Complete energy level and fasting status to save</p>}
        </div>
      );
    };

    const EveningCheckin = (props) => {
      const defaults = { stressLevel: 5, activityLevel: null, tiredness: 5, exerciseDone: [], cravings: null, mood: null, dayNotes: "" };
      const [form, setForm] = useState(props.existing || defaults);
      const f = (k, v) => setForm((p) => { const n = Object.assign({}, p); n[k] = v; return n; });
      const canSave = form.activityLevel && form.cravings && form.mood;
      const stressColor = form.stressLevel <= 4 ? A : form.stressLevel <= 7 ? "#FFD700" : RED;
      const tiredColor = form.tiredness <= 4 ? A : form.tiredness <= 7 ? "#FFD700" : RED;
      const moodOptions = [{ e: "😞", l: "Rough" }, { e: "😕", l: "Meh" }, { e: "😐", l: "Okay" }, { e: "🙂", l: "Good" }, { e: "😁", l: "Great" }];
      return (
        <div style={{ padding: "20px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
            <div onClick={props.onBack} style={{ width: 36, height: 36, borderRadius: "50%", background: C2, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 20, color: SOFT }}>‹</div>
            <div><div style={{ fontSize: 10, color: MUT, letterSpacing: 3, textTransform: "uppercase" }}>Daily Log</div><H size={28}>EVENING CHECK-IN 🌙</H></div>
          </div>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>TODAY'S STRESS & WELLBEING</H>
            <Slider label="Stress Level Today" value={form.stressLevel} onChange={(v) => f("stressLevel", v)} leftLabel="😌 Totally calm" rightLabel="😤 Overwhelmed" color={stressColor} />
            <Slider label="How Tired Did You Feel Today?" value={form.tiredness} onChange={(v) => f("tiredness", v)} leftLabel="⚡ Energized" rightLabel="💀 Exhausted" color={tiredColor} />
            <EmojiRow label="Overall Mood Today" value={form.mood} onChange={(v) => f("mood", v)} options={moodOptions} />
          </Card>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>MOVEMENT & ACTIVITY</H>
            <Chips label="Overall Activity Level Today" value={form.activityLevel} onChange={(v) => f("activityLevel", v)} multi={false} options={["Sedentary", "Light", "Moderate", "Active", "Very Active"]} />
            <Chips label="Exercise Completed (select all)" value={form.exerciseDone} onChange={(v) => f("exerciseDone", v)} multi={true} options={["🚶 Walk", "🏃 Run", "🚴 Peloton", "💪 Bodyweight", "🏋️ Other"]} />
          </Card>
          <Card style={{ marginBottom: 14 }}>
            <H size={16} color={A} mb={18}>CRAVINGS & NOTES</H>
            <Chips label="Sugar / Soda Cravings Today" value={form.cravings} onChange={(v) => f("cravings", v)} multi={false} options={["None 🙌", "Mild 😐", "Strong 😬", "Gave In 😔"]} />
            <Divider label="optional" />
            <div><div style={{ fontSize: 13, color: SOFT, fontWeight: 500, marginBottom: 10 }}>Day Notes</div><textarea rows={3} placeholder="How did today go? Anything worth noting..." value={form.dayNotes} onChange={(e) => f("dayNotes", e.target.value)} /></div>
          </Card>
          <Btn full disabled={!canSave} onClick={() => props.onSave(Object.assign({}, form, { timestamp: new Date().toISOString() }))}>SAVE EVENING CHECK-IN ✓</Btn>
          {!canSave && <p style={{ fontSize: 12, color: MUT, textAlign: "center", marginTop: 10 }}>Complete activity, cravings, and mood to save</p>}
        </div>
      );
    };

    const HistoryScreen = (props) => {
      const { checkins, weightLog, profile } = props;
      const sortedDates = Object.keys(checkins).sort((a, b) => b.localeCompare(a)).slice(0, 60);
      const insights = buildInsights(checkins);
      const chartData = weightLog.slice(-30);
      return (
        <div style={{ padding: "20px 16px" }}>
          <H size={40} color="#fff" mb={4}>HISTORY &<br/><span style={{ color: A }}>INSIGHTS</span></H>
          <p style={{ color: MUT, fontSize: 13, marginBottom: 24, lineHeight: 1.6 }}>Your patterns reveal your progress. Data beats guesswork.</p>
          {weightLog.length > 1 ? (
            <Card style={{ marginBottom: 16 }}>
              <H size={16} color={A} mb={16}>WEIGHT TREND</H>
              <WeightChart data={chartData} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 12 }}>
                <span style={{ color: MUT }}>Start: <strong style={{ color: "#fff" }}>{profile.startWeight}</strong></span>
                {weightLog.length > 0 && <span style={{ color: A, fontWeight: 600 }}>Latest: {weightLog[weightLog.length - 1].weight} lbs</span>}
                <span style={{ color: MUT }}>Goal: <strong style={{ color: "#fff" }}>{profile.goalWeight}</strong></span>
              </div>
            </Card>
          ) : (
            <Card style={{ marginBottom: 16, textAlign: "center", padding: 32 }}><div style={{ fontSize: 36, marginBottom: 10 }}>⚖️</div><div style={{ color: SOFT, fontSize: 14 }}>Log your weight a few times to see your trend chart.</div></Card>
          )}
          {insights.length > 0 && (
            <Card style={{ marginBottom: 16 }}>
              <H size={16} color={A} mb={4}>✨ YOUR PERSONAL INSIGHTS</H>
              <p style={{ fontSize: 12, color: MUT, marginBottom: 14, lineHeight: 1.5 }}>Patterns discovered from your check-in data</p>
              {insights.map((ins, i) => (
                <div key={i} style={{ display: "flex", gap: 14, padding: "12px 0", borderBottom: i < insights.length - 1 ? "1px solid " + BDR : "none" }}>
                  <span style={{ fontSize: 24, flexShrink: 0 }}>{ins.icon}</span>
                  <p style={{ fontSize: 13, color: SOFT, lineHeight: 1.65 }}>{ins.text}</p>
                </div>
              ))}
            </Card>
          )}
          {insights.length === 0 && Object.keys(checkins).length < 3 && (
            <div style={{ background: "rgba(0,232,122,0.05)", border: "1px solid rgba(0,232,122,0.15)", borderRadius: 12, padding: 16, marginBottom: 16, textAlign: "center" }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>🧬</div>
              <div style={{ fontSize: 13, color: A, fontWeight: 600 }}>Insights unlock after 3+ days</div>
              <div style={{ fontSize: 12, color: MUT, marginTop: 6, lineHeight: 1.5 }}>Keep completing check-ins and we'll surface patterns in your sleep, stress, and weight data.</div>
            </div>
          )}
          <H size={24} color="#fff" mb={14}>CHECK-IN LOG</H>
          {sortedDates.length === 0 ? (
            <Card style={{ textAlign: "center", padding: 32 }}><div style={{ fontSize: 36, marginBottom: 10 }}>📋</div><div style={{ color: SOFT, fontSize: 14 }}>Complete your first check-in to start building your log.</div></Card>
          ) : sortedDates.map((date) => {
            const c = checkins[date];
            return (
              <Card key={date} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 18 }}>{fmtDate(date)}</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {c.morning && <span style={{ fontSize: 10, background: "rgba(0,232,122,0.1)", color: A, border: "1px solid rgba(0,232,122,0.25)", borderRadius: 20, padding: "2px 9px" }}>🌅 AM</span>}
                    {c.evening && <span style={{ fontSize: 10, background: "rgba(0,232,122,0.1)", color: A, border: "1px solid rgba(0,232,122,0.25)", borderRadius: 20, padding: "2px 9px" }}>🌙 PM</span>}
                  </div>
                </div>
                {c.morning && <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: c.evening ? 8 : 0 }}>
                  <span style={{ fontSize: 12, color: SOFT }}>💤 Sleep: <strong style={{ color: "#fff" }}>{c.morning.sleepScore}/10</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>🌙 Woke: <strong style={{ color: "#fff" }}>{c.morning.timesWoken}x</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>⚡ Energy: <strong style={{ color: "#fff" }}>{energyLabels[c.morning.energyLevel] || "–"}</strong></span>
                </div>}
                {c.evening && <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                  <span style={{ fontSize: 12, color: SOFT }}>🧠 Stress: <strong style={{ color: "#fff" }}>{c.evening.stressLevel}/10</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>😴 Tired: <strong style={{ color: "#fff" }}>{c.evening.tiredness}/10</strong></span>
                  <span style={{ fontSize: 12, color: SOFT }}>🏃 <strong style={{ color: "#fff" }}>{c.evening.activityLevel}</strong></span>
                  {c.evening.mood && <span style={{ fontSize: 12, color: SOFT }}>Mood: <strong style={{ color: "#fff" }}>{moodLabels[c.evening.mood]}</strong></span>}
                </div>}
                {c.morning && c.morning.sleepNotes && <p style={{ fontSize: 11, color: MUT, marginTop: 8, fontStyle: "italic" }}>"{c.morning.sleepNotes}"</p>}
                {c.evening && c.evening.dayNotes && <p style={{ fontSize: 11, color: MUT, marginTop: 8, fontStyle: "italic" }}>"{c.evening.dayNotes}"</p>}
              </Card>
            );
          })}
        </div>
      );
    };

    function App() {
      const [profile, setProfile] = useState(() => db.get("profile"));
      const [checkins, setCheckins] = useState(() => db.get("checkins") || {});
      const [weightLog, setWeightLog] = useState(() => db.get("weightLog") || []);
      const [tab, setTab] = useState("home");

      const saveProfile = (p) => {
        setProfile(p); db.set("profile", p);
        const initLog = [{ date: p.startDate, weight: p.startWeight }];
        setWeightLog(initLog); db.set("weightLog", initLog);
      };

      const saveCheckin = (date, type, data) => {
        const existing = checkins[date] || {};
        const newForDate = Object.assign({}, existing);
        newForDate[type] = data;
        const updated = Object.assign({}, checkins);
        updated[date] = newForDate;
        setCheckins(updated); db.set("checkins", updated);
        if (type === "morning" && data.morningWeight) {
          const entry = { date: date, weight: +data.morningWeight };
          const filtered = weightLog.filter((w) => w.date !== date);
          filtered.push(entry);
          filtered.sort((a, b) => a.date.localeCompare(b.date));
          setWeightLog(filtered); db.set("weightLog", filtered);
          const up = Object.assign({}, profile, { currentWeight: +data.morningWeight });
          setProfile(up); db.set("profile", up);
        }
      };

      const addWeight = (weight) => {
        const t = localToday();
        const entry = { date: t, weight: parseFloat(weight) };
        const filtered = weightLog.filter((w) => w.date !== t);
        filtered.push(entry);
        filtered.sort((a, b) => a.date.localeCompare(b.date));
        setWeightLog(filtered); db.set("weightLog", filtered);
        const up = Object.assign({}, profile, { currentWeight: parseFloat(weight) });
        setProfile(up); db.set("profile", up);
      };

      if (!profile) return <ProfileSetup onSave={saveProfile} />;

      const t = localToday();
      const todayCheckin = checkins[t] || {};
      const morningDone = !!todayCheckin.morning;
      const eveningDone = !!todayCheckin.evening;

      const onSaveMorning = (d) => { saveCheckin(t, "morning", d); setTab("home"); };
      const onSaveEvening = (d) => { saveCheckin(t, "evening", d); setTab("home"); };
      const back = () => setTab("home");

      return (
        <AppShell tab={tab} setTab={setTab} morningDone={morningDone} eveningDone={eveningDone}>
          {tab === "home" && <HomeScreen profile={profile} checkins={checkins} weightLog={weightLog} morningDone={morningDone} eveningDone={eveningDone} setTab={setTab} addWeight={addWeight} />}
          {tab === "morning" && <MorningCheckin existing={todayCheckin.morning} onSave={onSaveMorning} onBack={back} />}
          {tab === "evening" && <EveningCheckin existing={todayCheckin.evening} onSave={onSaveEvening} onBack={back} />}
          {tab === "history" && <HistoryScreen checkins={checkins} weightLog={weightLog} profile={profile} />}
        </AppShell>
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (e) {
      document.getElementById('root').innerHTML = '<div class="err"><h2>App Error</h2><pre>' + (e.message || e) + '</pre></div>';
    }
  </script>
</body>
</html>
